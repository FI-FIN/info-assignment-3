<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Inter', sans-serif; background: #F2F2F2; display: flex; justify-content: center; align-items: center; height: 100vh; }

</head>
<body>
    <div class="box">
        <h1 style="font-weight:900; text-transform:uppercase;">Secure Acquisition</h1>

        <input type="text" placeholder="124 Heritage Lane...">
        <button class="btn" onclick="location.href='thankyou.html'">Complete Purchase</button>
    </div>
</body>
</html>
