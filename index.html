<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Antique Bookshop & Curios</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <!--
     
     Inter 
     types: 
        400 (Regular/Normal text)
        700 (Bold text)     
        900 (Extra Black title text) 
     
     
     JetBrains Mono
     types: 
        500 (Medium thickness)
        800 (Extra-bold thickness)


    I think thats all :@
     -->
    <style>
        /* 
         * MY WEBSITE STYLES 
         * Colors used:
         * Dark Charcoal: #1A1A1A
         * White: #ffffff
         * Light Gray: #EEEEEE
         * Muted Text: #8E8E93
         * Logo Tan: #A39684
         */

        /* Set up the body */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f8f8f8; 
            font-family: 'Inter', sans-serif; 
            color: #1A1A1A; 
            overflow-x: hidden; 
        }

        /* */
        html { 
            margin: 0; 
            padding: 0; 
            background-color: #f8f8f8; 
            font-family: 'Inter', sans-serif; 
            color: #1A1A1A; 
            overflow-x: hidden; 
        }

        /* Main box  */
        .viewport { 
            max-width: 1440px; 
            margin: 0 auto; 
            background-color: #ffffff; 
            min-height: 100vh; 
            position: relative; 
            box-shadow: 0 0 100px rgba(0,0,0,0.1); 
        }

        /* Inner box to give pading on the sides p */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 60px; 
        }

        /* --- header arae --- */
        header { 
            padding: 24px 0; 
            border-bottom: 1px solid #EEEEEE; 
            margin-bottom: 40px; 
        }

        .brand-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .brand { 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.3em; 
            color: #A39684; 
        }

        /* Top right icons rapper */
        .header-utils { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            position: relative; 
        }

        /* Top right search wrapper */
        .search-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        /* Hiding the search bar default */
        #search-input-wrap { 
            width: 0; 
            overflow: hidden; 
            transition: width 0.4s ease;
            display: flex; 
            align-items: center; 
        }

        /* open it */
        #search-input-wrap.active { 
            width: 300px; 
        }

        /* The real search text box for inputs here ;? */
        .header-search-bar { 
            width: 100%; 
            padding: 10px 15px; 
            border-radius: 30px; 
            border: 1.5px solid #1A1A1A; 
            font-family: 'Inter', sans-serif; 
            font-size: 14px; 
            outline: none; 
        }

        /* Circle around the search icon */
        .icon-circle { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            border: 1px solid #EEEEEE; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: #ffffff; 
            position: relative; 
            text-decoration: none; 
            color: #000000; 
        }

        /* Hover effect for icon circle */
        .icon-circle:hover { 
            border-color: #1A1A1A; 
        }

        /* notification bubble for cart */
        #cart-count { 
            position: absolute; 
            top: -5px; 
            right: -5px; 
            background: #000000; 
            color: #ffffff; 
            font-size: 10px; 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
        }


        .nav-links { 
            display: flex; 
            gap: 35px; 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }

        .nav-links li { 
            font-size: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: #8E8E93; 
        }

        .nav-links a { 
            text-decoration: none; 
            color: #8E8E93; 
            transition: color 0.2s; 
        }

        .nav-links a:hover { 
            color: #1A1A1A; 
        }

        /* link dark */
        .nav-links li.active a { 
            color: #1A1A1A; 
            font-weight: 900; 
            border-bottom: none; 
        }

   
        .hero-title { 
            font-size: 82px; 
            font-weight: 900; 
            line-height: 0.9; 
            letter-spacing: -0.05em; 
            margin: 60px 0 20px; 
        }

        /* The box where the AI talks */
        #ai-response { 
            display: none; 
            border-left: 4px solid #000000; 
            padding: 20px 0 20px 30px; 
            margin: 40px 0; 
            max-width: 850px; 
            animation: slideIn 0.5s ease-out; 
        }

        .ai-text { 
            font-size: 24px; 
            font-weight: 500; 
            line-height: 1.4; 
            color: #333333; 
        }

        .ai-label { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 11px; 
            color: #8E8E93; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
        }

  
        /* Book grid */
        .book-grid_book_hold { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 30px; 
            margin-top: 40px; 
            padding-bottom: 150px; 
        }

        /* book card */
        .book-card { 
            text-decoration: none; 
            color: inherit; 
            transition: transform 0.3s; 
            display: flex; 
            flex-direction: column; 
        }

        .book-card:hover { 
            transform: translateY(-10px); 
        }

        /* The book image */
        .img-box { 
            width: 100%; 
            aspect-ratio: 2/3; 
            background-size: cover; 
            background-position: center; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .b-title { 
            font-size: 13px; 
            font-weight: 800; 
            margin-top: 15px; 
            text-transform: uppercase; 
            min-height: 32px; 
        }

        .b-meta { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 10px; 
            color: #8E8E93; 
            margin-top: 5px; 
        }

        /* --- Bottom AI bar --- */
        .ai-sticky-container { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            padding: 40px 0; 
            background: linear-gradient(transparent, #ffffff 40%); 
            z-index: 1000; 
            pointer-events: none; 
        }

        .ai-pill { 
            width: 900px; 
            background: #ffffff; 
            border: 1px solid #e0e0e0; 
            border-radius: 100px; 
            padding: 12px 12px 12px 35px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.12); 
            pointer-events: auto; 
        }

        .ai-pill input { 
            border: none; 
            width: 80%; 
            font-size: 17px; 
            outline: none; 
            font-family: 'Inter', sans-serif; 
            background: transparent; 
        }

        .ai-btn { 
            width: 48px; 
            height: 48px; 
            background: #1A1A1A; 
            border-radius: 50%; 
            border: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
        }

        .chevron-arrow { 
            width: 10px; 
            height: 10px; 
            border-top: 3px solid #ffffff; 
            border-right: 3px solid #ffffff; 
            transform: rotate(-45deg); 
            margin-top: 5px; 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-10px); } 
            to { opacity: 1; transform: translateX(0); } 
        }


        @media (max-width: 800px) {
            
            .viewport { 
                width: 100% !important; 
                padding-bottom: 120px !important; 
                box-shadow: none !important; 
            }
            
            .container { 
                padding: 0 20px !important; 
            }

            /* def all headers modile*/
            .hero-title { 
                font-size: 42px !important; 
                line-height: 1 !important; 
            }
            .item-title { 
                font-size: 42px !important; 
                line-height: 1 !important; 
            }
            .page-title { 
                font-size: 42px !important; 
                line-height: 1 !important; 
            }
            h1 { 
                font-size: 42px !important; 
                line-height: 1 !important; 
            }

            .hero-subtext { 
                font-size: 15px !important; 
            }
            
            header { 
                padding: 20px 0 !important; 
                margin-bottom: 20px !important; 
            }
            
            /* Stacking top bar */
            .top-bar { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 15px; 
            }
            .brand-row { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 15px; 
            }
            
            .header-utils { 
                align-self: flex-end; 
                margin-top: -30px; 
            }
            
            .nav-links { 
                overflow-x: auto; 
                width: 100%; 
                padding-bottom: 10px; 
                gap: 20px !important; 
                scrollbar-width: none; 
            }
            
            .nav-links::-webkit-scrollbar { 
                display: none; 
            }
            
            /* Changing grid to 2 columns for mobil*/
            .book-grid_book_hold { 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 20px 15px !important; 
            }

            .main-container { 
                grid-template-columns: 1fr !important; 
                height: auto !important; 
            }
            .content-grid_book_hold { 
                grid-template-columns: 1fr !important; 
                height: auto !important; 
            }
            .checkout-container { 
                grid-template-columns: 1fr !important; 
                height: auto !important; 
            }
            
            .visual-side { padding: 30px 20px !important; }
            .info-side { padding: 30px 20px !important; }
            .review-side { padding: 30px 20px !important; }
            .payment-side { padding: 30px 20px !important; }
            
            .metadata-grid_book_hold { 
                grid-template-columns: 1fr !important; 
                gap: 15px !important; 
            }
            
            .book-cover-wrapper { 
                width: 100% !important; 
            }
            
            /* moving ai bar AI bar */
            .ai-sticky-container { 
                padding: 20px !important; 
            }
            
            .ai-pill { 
                width: 100% !important; 
                padding: 8px 8px 8px 20px !important; 
                border-radius: 40px !important; 
            }
            
            .ai-pill input { 
                font-size: 14px !important; 
            }
            
            .ai-btn { 
                width: 40px !important; 
                height: 40px !important; 
            }
        }
    </style>
</head>

    <script src="data.js"></script>

    <!-- UI Logic -->
    <script>
        var grid_book_hold = document.getElementById('grid_book_hold');
        var little_ai_pill = document.getElementById('bottom-search');
        var top_boy_search = document.getElementById('header-search');
        var hide_full_search = document.getElementById('search-input-wrap');
        var ai_container_box = document.getElementById('ai-response');
        var ai_yap = document.getElementById('ai-text');
        var header = document.getElementById('page-header');

        function init() {
            var allBooks = Object.keys(inventory);
            rendergrid_book_hold(allBooks); 
            
            if (typeof updateCartUI === 'function') {
                updateCartUI();
            }
        }

        function toggleSearch() {
            var searchBoxWrap = document.getElementById('search-input-wrap');
            var topSearchInput = document.getElementById('header-search');
            
            if (searchBoxWrap.classList.contains('active') == true) {
                searchBoxWrap.classList.remove('active');
            } else {
                searchBoxWrap.classList.add('active');
                topSearchInput.focus();
            }
        }

  
        function rendergrid_book_hold(keys) {
            var grid = document.getElementById('grid_book_hold');
            grid.innerHTML = ""; // clear 
            
            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                var b = inventory[key];
                
                var htmlString = "<a href='product.html?id=" + key + "' class='book-card'>";
                htmlString = htmlString + "<div class='img-box' style='background-image: url(\"" + b.img + "\")'></div>";
                htmlString = htmlString + "<div class='b-title'>" + b.title + "</div>";
                htmlString = htmlString + "<div class='b-meta'>" + b.author + " / $" + b.price + "</div>";
                htmlString = htmlString + "</a>";
                
                grid.innerHTML = grid.innerHTML + htmlString;
            }
        }


        function executeLibrarianSearch(user_type_text) {
            if (user_type_text == "") {
                return;
            }

            var grid = document.getElementById('grid_book_hold');
            var header = document.getElementById('page-header');
            var aiBox = document.getElementById('ai-response');
            var aiText = document.getElementById('ai-text');

            grid.style.transition = "opacity 0.4s ease";
            grid.style.opacity = "0.2";
            
            if (header != null) {
                header.innerHTML = "Consulting<br>Stacks...";
            }
            
            if (aiBox != null) {
                aiBox.style.display = "block";
                aiText.innerHTML = "Cross-referencing metadata indices...";
            }

            setTimeout(function() {
                var bingo_books = [];
                var allKeys = Object.keys(inventory);

                for (var i = 0; i < allKeys.length; i++) {
                    var currentKey = allKeys[i];
                    var book = inventory[currentKey];
                    
                    var titleLower = book.title.toLowerCase();
                    var authorLower = book.author.toLowerCase();
                    var searchLower = user_type_text.toLowerCase();
                    
                    if (titleLower.includes(searchLower) == true) {
                        bingo_books.push(currentKey);
                    } else if (authorLower.includes(searchLower) == true) {
                        bingo_books.push(currentKey);
                    }
                }

                if (header != null) {
                    header.innerHTML = "AI Search<br>";
                }
                grid.style.opacity = "1";
                
                if (bingo_books.length > 0) {
                    var bestMatch = inventory[bingo_books[0]];
                    aiText.innerHTML = "I have identified <b>" + bingo_books.length + " match(es)</b>. Based on your inquiry, I recommend the <b>" + bestMatch.title + "</b>.";
                    rendergrid_book_hold(bingo_books);
                } else {
                    aiText.innerHTML = "I apologize. I could not locate any volumes matching <b>" + user_type_text + "</b>. Shall I broaden the search?";
                    rendergrid_book_hold([]);
                }

            }, 1200); 
        }

        // bottom search event
        document.getElementById('bottom-search').onkeypress = function(event) {
            if (event.key == "Enter") {
                var searchInputValue = document.getElementById('bottom-search').value;
                executeLibrarianSearch(searchInputValue);
            }
        };

 
        function executetop_boy_search() {
            var topSearchInput = document.getElementById('header-search');
            var user_type_text = topSearchInput.value.toLowerCase();
            
            var aiBox = document.getElementById('ai-response');
            var header = document.getElementById('page-header');
            var searchWrap = document.getElementById('search-input-wrap');
            
            if (aiBox != null) {
                aiBox.style.display = "none";
            }
            
            if (user_type_text == "") {
                if (header != null) {
                    header.innerHTML = "Latest<br>Catalogue";
                }
                var allKeys = Object.keys(inventory);
                rendergrid_book_hold(allKeys); 
                searchWrap.classList.remove('active');
                return;
            }

            var bingo_books = [];
            var allKeys2 = Object.keys(inventory);

            for (var i = 0; i < allKeys2.length; i++) {
                var currentKey = allKeys2[i];
                var book = inventory[currentKey];
                
                var titleLower = book.title.toLowerCase();
                var authorLower = book.author.toLowerCase();
                
                if (titleLower.includes(user_type_text) == true) {
                    bingo_books.push(currentKey);
                } else if (authorLower.includes(user_type_text) == true) {
                    bingo_books.push(currentKey);
                }
            }


            if (bingo_books.length == 0) {
                if (header != null) {
                    header.innerHTML = "No results for '" + topSearchInput.value + "'";
                }
                rendergrid_book_hold([]); 
            }


            if (bingo_books.length > 0) {
                if (header != null) {
                    header.innerHTML = "Search";
                }
                rendergrid_book_hold(bingo_books);
            }

            searchWrap.classList.remove('active');
        }

        // Top search event 
        document.getElementById('header-search').onkeypress = function(event) {
            if (event.key == "Enter") {
                event.preventDefault(); 
                executetop_boy_search();
            }
        };
    </script>
